<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>light-chat web</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body {
            margin: 0;
            background: #111418;
            color: #e6edf3;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        .sidebar {
            border-right: 1px solid #2d3743;
            padding: 1rem;
        }

        .sidebar h1 {
            margin: 0 0 0.5rem;
            font-size: 1.1rem;
        }

        .meta {
            font-size: 0.9rem;
            color: #98a6b6;
            line-height: 1.5;
        }

        .sidebar-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .sidebar-actions button {
            padding: 0.45rem 0.55rem;
            font-size: 0.82rem;
            background: #1e242b;
        }

        .debug-panel {
            margin-top: 1rem;
            border: 1px solid #2d3743;
            border-radius: 8px;
            padding: 0.6rem;
            background: #0f1317;
        }

        .session-panel {
            margin-top: 1rem;
            border: 1px solid #2d3743;
            border-radius: 8px;
            padding: 0.6rem;
            background: #0f1317;
        }

        .session-panel h2 {
            margin: 0 0 0.4rem;
            font-size: 0.9rem;
        }

        .session-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.4rem;
            margin-bottom: 0.45rem;
        }

        #session-name,
        #session-picker {
            border: 1px solid #2d3743;
            background: #111418;
            color: #e6edf3;
            border-radius: 6px;
            padding: 0.45rem;
            font-size: 0.8rem;
            min-width: 0;
        }

        .debug-panel h2 {
            margin: 0 0 0.4rem;
            font-size: 0.9rem;
        }

        #debug-content {
            font-size: 0.8rem;
            line-height: 1.4;
            white-space: pre-wrap;
            color: #98a6b6;
            min-height: 4.8em;
        }

        #debug-history-content {
            font-size: 0.78rem;
            line-height: 1.35;
            white-space: pre-wrap;
            color: #98a6b6;
            min-height: 5.2em;
            margin-top: 0.45rem;
            border-top: 1px dashed #2d3743;
            padding-top: 0.45rem;
        }

        .main {
            display: grid;
            grid-template-rows: 1fr auto;
            min-height: 0;
        }

        #chat-log {
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            padding: 0.75rem 0.9rem;
            border-radius: 10px;
            max-width: 78%;
            white-space: pre-wrap;
            line-height: 1.45;
        }

        .message.user {
            background: #183047;
            border: 1px solid #214a71;
            align-self: end;
        }

        .message.assistant {
            background: #1e242b;
            border: 1px solid #2d3743;
            align-self: start;
        }

        .composer {
            border-top: 1px solid #2d3743;
            padding: 1rem;
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }

        .quick-actions button {
            background: #1e242b;
            border: 1px solid #2d3743;
            padding: 0.45rem 0.65rem;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.82rem;
        }

        #status-line {
            color: #98a6b6;
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            min-height: 1.2em;
        }

        #chat-form {
            display: flex;
            gap: 0.65rem;
        }

        #user-input {
            flex: 1;
            border: 1px solid #2d3743;
            background: #0f1317;
            color: #e6edf3;
            border-radius: 8px;
            padding: 0.7rem 0.8rem;
        }

        button {
            border: 1px solid #2d3743;
            background: #1f6feb;
            color: white;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            cursor: pointer;
        }

        button:disabled,
        #user-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .retry-btn {
            margin-top: 0.6rem;
            background: #214a71;
            border: 1px solid #2d3743;
            padding: 0.45rem 0.7rem;
            border-radius: 6px;
            color: #e6edf3;
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <h1>{{ character_name }}</h1>
            <div class="meta">
                <div><strong>Model:</strong> {{ model_name or "N/A" }}</div>
                <div><strong>Type:</strong> {{ model_type or "N/A" }}</div>
                <div><strong>RAG:</strong> {{ rag_collection or "N/A" }}</div>
            </div>
            <div class="sidebar-actions">
                <button type="button" id="help-btn" hx-post="/chat/action/help" hx-target="#chat-log"
                    hx-swap="beforeend">Help</button>
                <button type="button" id="clear-btn" hx-post="/chat/action/clear" hx-target="#chat-log"
                    hx-swap="innerHTML">Clear</button>
                <button type="button" id="reload-btn" hx-post="/chat/action/reload" hx-target="#chat-log"
                    hx-swap="innerHTML">Reload</button>
                <button type="button" id="load-latest-btn" hx-post="/chat/session/load-latest" hx-target="#chat-log"
                    hx-swap="innerHTML">Load Latest</button>
            </div>
            <div class="session-panel">
                <h2>Sessions</h2>
                <div class="session-row">
                    <input id="session-name" type="text" placeholder="Session name (optional)" maxlength="80" />
                    <button type="button" id="save-named-btn">Save</button>
                </div>
                <div class="session-row">
                    <select id="session-picker"></select>
                    <button type="button" id="load-selected-btn">Load</button>
                </div>
                <button type="button" id="refresh-sessions-btn">Refresh List</button>
            </div>
            <div class="debug-panel">
                <h2>Retrieval Debug</h2>
                <div id="debug-content">No retrievals yet.</div>
                <div id="debug-history-content">No retrieval history yet.</div>
                <button type="button" id="refresh-debug-btn">Refresh Debug</button>
            </div>
        </aside>

        <main class="main">
            <section id="chat-log">
                {% for item in messages %}
                <div class="message {{ item.role }}" data-role="{{ item.role }}">{{ item.content }}</div>
                {% endfor %}
            </section>

            <section class="composer">
                <div id="status-line">Ready</div>
                <div class="quick-actions">
                    <button type="button" id="save-session-btn">Save Session</button>
                    <button type="button" id="copy-last-btn">Copy Last</button>
                    <button type="button" id="export-txt-btn">Export TXT</button>
                    <button type="button" id="export-json-btn">Export JSON</button>
                </div>
                <form id="chat-form" hx-post="/chat/send" hx-target="#chat-log" hx-swap="beforeend">
                    <input id="user-input" name="message" placeholder="Type your message..." autocomplete="off"
                        required />
                    <button id="send-btn" type="submit">Send</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        const chatForm = document.getElementById("chat-form");
        const chatLog = document.getElementById("chat-log");
        const userInput = document.getElementById("user-input");
        const sendButton = document.getElementById("send-btn");
        const statusLine = document.getElementById("status-line");
        const debugContent = document.getElementById("debug-content");
        const refreshDebugButton = document.getElementById("refresh-debug-btn");
        const saveSessionButton = document.getElementById("save-session-btn");
        const saveNamedButton = document.getElementById("save-named-btn");
        const copyLastButton = document.getElementById("copy-last-btn");
        const exportTxtButton = document.getElementById("export-txt-btn");
        const exportJsonButton = document.getElementById("export-json-btn");
        const clearButton = document.getElementById("clear-btn");
        const reloadButton = document.getElementById("reload-btn");
        const helpButton = document.getElementById("help-btn");
        const loadLatestButton = document.getElementById("load-latest-btn");
        const sessionNameInput = document.getElementById("session-name");
        const sessionPicker = document.getElementById("session-picker");
        const loadSelectedButton = document.getElementById("load-selected-btn");
        const refreshSessionsButton = document.getElementById("refresh-sessions-btn");
        const debugHistoryContent = document.getElementById("debug-history-content");

        const promptHistory = [];
        let promptHistoryIndex = 0;

        const STREAM_TIMEOUT_MS = 90000;

        function setSendingState(isSending) {
            userInput.disabled = isSending;
            sendButton.disabled = isSending;
        }

        function scrollChatToBottom() {
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function setStatus(text) {
            statusLine.textContent = text;
        }

        function collectMessages() {
            const nodes = Array.from(chatLog.querySelectorAll(".message[data-role]"));
            return nodes.map((node) => ({
                role: node.dataset.role,
                content: node.textContent ?? "",
            }));
        }

        function downloadText(filename, text, mimeType) {
            const blob = new Blob([text], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = filename;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            URL.revokeObjectURL(url);
        }

        function capturePrompt(message) {
            const normalized = (message ?? "").trim();
            if (!normalized) {
                return;
            }
            const previous = promptHistory[promptHistory.length - 1];
            if (previous === normalized) {
                promptHistoryIndex = promptHistory.length;
                return;
            }
            promptHistory.push(normalized);
            if (promptHistory.length > 100) {
                promptHistory.shift();
            }
            promptHistoryIndex = promptHistory.length;
        }

        async function refreshDebugPanel() {
            try {
                const response = await fetch("/chat/debug", { method: "GET" });
                if (!response.ok) {
                    debugContent.textContent = "Debug endpoint unavailable";
                    return;
                }
                const payload = await response.json();
                const retrieval = payload?.retrieval ?? {};
                const main = retrieval?.main ?? {};
                const mes = retrieval?.mes ?? {};
                const cleanup = retrieval?.cleanup ?? {};
                debugContent.textContent = [
                    `Collection: ${retrieval?.collection ?? "n/a"}`,
                    `Key matches: ${retrieval?.key_match_count ?? 0}`,
                    `Main chunks: ${main.returned ?? 0}/${main.candidates ?? 0} (queries=${main.queries ?? 0}, rerank=${main.rerank_applied ? "yes" : "no"})`,
                    `Mes chunks: ${mes.returned ?? 0}/${mes.candidates ?? 0} (queries=${mes.queries ?? 0}, rerank=${mes.rerank_applied ? "yes" : "no"})`,
                    `Cross removed: ${cleanup.cross_removed ?? 0}`,
                    `History turns: ${payload?.history_turns ?? 0}`,
                ].join("\n");
            } catch {
                debugContent.textContent = "Debug endpoint unavailable";
            }
        }

        async function refreshDebugHistoryPanel() {
            try {
                const response = await fetch("/chat/debug/history", { method: "GET" });
                if (!response.ok) {
                    debugHistoryContent.textContent = "History endpoint unavailable";
                    return;
                }
                const payload = await response.json();
                const history = Array.isArray(payload?.history) ? payload.history : [];
                if (!history.length) {
                    debugHistoryContent.textContent = "No retrieval history yet.";
                    return;
                }
                const recent = history.slice(-8).reverse();
                debugHistoryContent.textContent = recent.map((entry) => {
                    const retrieval = entry?.retrieval ?? {};
                    const main = retrieval?.main ?? {};
                    return `T${entry?.turn ?? "?"} k=${retrieval?.key_match_count ?? 0} main=${main?.returned ?? 0}/${main?.candidates ?? 0} q=${main?.queries ?? 0} rerank=${main?.rerank_applied ? "yes" : "no"}`;
                }).join("\n");
            } catch {
                debugHistoryContent.textContent = "History endpoint unavailable";
            }
        }

        async function refreshSessionList() {
            try {
                const response = await fetch("/chat/session/list", { method: "GET" });
                if (!response.ok) {
                    setStatus("Failed to list sessions");
                    return;
                }
                const payload = await response.json();
                const sessions = Array.isArray(payload?.sessions) ? payload.sessions : [];
                const previous = sessionPicker.value;
                sessionPicker.innerHTML = "";
                if (!sessions.length) {
                    const option = document.createElement("option");
                    option.value = "";
                    option.textContent = "No saved sessions";
                    sessionPicker.appendChild(option);
                    sessionPicker.disabled = true;
                    loadSelectedButton.disabled = true;
                    return;
                }
                sessions.forEach((session) => {
                    const option = document.createElement("option");
                    option.value = session.session_id;
                    option.textContent = session.session_name || session.session_id;
                    sessionPicker.appendChild(option);
                });
                sessionPicker.disabled = false;
                loadSelectedButton.disabled = false;
                if (previous && sessions.some((session) => session.session_id === previous)) {
                    sessionPicker.value = previous;
                }
            } catch {
                setStatus("Failed to list sessions");
            }
        }

        function showRetry(target, message, reason) {
            target.textContent = "";
            const reasonText = document.createElement("div");
            reasonText.textContent = reason;
            target.appendChild(reasonText);

            const retryButton = document.createElement("button");
            retryButton.type = "button";
            retryButton.className = "retry-btn";
            retryButton.textContent = "Retry";
            retryButton.dataset.assistantId = target.id;
            retryButton.dataset.message = message;
            target.appendChild(retryButton);
        }

        async function streamAssistant(assistantId, message) {
            const target = document.getElementById(assistantId);
            if (!target) {
                setSendingState(false);
                setStatus("Error: missing response target");
                return;
            }

            target.dataset.sourceMessage = message;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort("timeout");
            }, STREAM_TIMEOUT_MS);

            let receivedAnyToken = false;
            setStatus("Thinking...");

            try {
                const response = await fetch("/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message }),
                    signal: controller.signal,
                });

                if (!response.ok || !response.body) {
                    showRetry(target, message, "[Error: stream unavailable]");
                    setStatus("Error: stream unavailable");
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                setStatus("Streaming response...");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }
                    receivedAnyToken = true;
                    target.textContent += decoder.decode(value, { stream: true });
                    scrollChatToBottom();
                }

                setStatus(receivedAnyToken ? "Response complete" : "No visible response");
                await refreshDebugPanel();
                await refreshDebugHistoryPanel();
            } catch (error) {
                const reason = error?.name === "AbortError"
                    ? "[Timed out while waiting for model response]"
                    : `[Error: ${error}]`;
                showRetry(target, message, reason);
                setStatus(error?.name === "AbortError" ? "Timed out" : "Error while streaming");
            } finally {
                clearTimeout(timeoutId);
                setSendingState(false);
                userInput.focus();
                scrollChatToBottom();
            }
        }

        chatForm.addEventListener("htmx:beforeRequest", () => {
            capturePrompt(userInput.value);
            setSendingState(true);
            userInput.value = "";
            setStatus("Sending...");
        });

        chatLog.addEventListener("htmx:afterSwap", (event) => {
            if (event.detail.target !== chatLog) {
                return;
            }

            const pendingNode = chatLog.querySelector("[data-pending-stream='1']");
            if (!pendingNode) {
                return;
            }

            const message = pendingNode.dataset.streamMessage;
            pendingNode.removeAttribute("data-pending-stream");

            if (!message) {
                setSendingState(false);
                setStatus("Error: empty message");
                return;
            }

            scrollChatToBottom();
            streamAssistant(pendingNode.id, message);
        });

        chatLog.addEventListener("click", (event) => {
            const retryButton = event.target.closest(".retry-btn");
            if (!retryButton) {
                return;
            }
            const assistantId = retryButton.dataset.assistantId;
            const message = retryButton.dataset.message;
            if (!assistantId || !message) {
                return;
            }
            setSendingState(true);
            setStatus("Retrying...");
            streamAssistant(assistantId, message);
        });

        refreshDebugButton.addEventListener("click", async () => {
            setStatus("Refreshing debug...");
            await refreshDebugPanel();
            await refreshDebugHistoryPanel();
            setStatus("Ready");
        });

        saveSessionButton.addEventListener("click", async () => {
            setStatus("Saving session...");
            try {
                const response = await fetch("/chat/session/save", { method: "POST" });
                const payload = await response.json();
                if (response.ok) {
                    setStatus(`Session saved: ${payload.session_name || payload.session_id}`);
                    await refreshSessionList();
                } else {
                    setStatus("Failed to save session");
                }
            } catch {
                setStatus("Failed to save session");
            }
        });

        saveNamedButton.addEventListener("click", async () => {
            setStatus("Saving named session...");
            try {
                const formData = new FormData();
                formData.append("session_name", sessionNameInput.value ?? "");
                const response = await fetch("/chat/session/save", {
                    method: "POST",
                    body: formData,
                });
                const payload = await response.json();
                if (response.ok) {
                    setStatus(`Session saved: ${payload.session_name || payload.session_id}`);
                    sessionNameInput.value = "";
                    await refreshSessionList();
                } else {
                    setStatus("Failed to save named session");
                }
            } catch {
                setStatus("Failed to save named session");
            }
        });

        loadSelectedButton.addEventListener("click", async () => {
            const sessionId = sessionPicker.value;
            if (!sessionId) {
                setStatus("No session selected");
                return;
            }
            setStatus("Loading selected session...");
            try {
                const formData = new FormData();
                formData.append("session_id", sessionId);
                const response = await fetch("/chat/session/load", {
                    method: "POST",
                    body: formData,
                });
                if (!response.ok) {
                    setStatus("Failed to load selected session");
                    return;
                }
                chatLog.innerHTML = await response.text();
                scrollChatToBottom();
                await refreshDebugPanel();
                await refreshDebugHistoryPanel();
                setStatus("Session loaded");
            } catch {
                setStatus("Failed to load selected session");
            }
        });

        refreshSessionsButton.addEventListener("click", async () => {
            setStatus("Refreshing sessions...");
            await refreshSessionList();
            setStatus("Ready");
        });

        loadLatestButton.addEventListener("click", async () => {
            setStatus("Loading latest session...");
        });

        copyLastButton.addEventListener("click", async () => {
            const messages = collectMessages();
            const lastAssistant = [...messages].reverse().find((item) => item.role === "assistant");
            if (!lastAssistant?.content) {
                setStatus("No assistant message to copy");
                return;
            }
            try {
                await navigator.clipboard.writeText(lastAssistant.content);
                setStatus("Copied latest assistant response");
            } catch {
                setStatus("Clipboard copy failed");
            }
        });

        exportTxtButton.addEventListener("click", () => {
            const lines = collectMessages().map((item) => `${item.role === "user" ? "User" : "Assistant"}: ${item.content}`);
            downloadText(`chat_export_${Date.now()}.txt`, lines.join("\n\n"), "text/plain;charset=utf-8");
            setStatus("Exported TXT");
        });

        exportJsonButton.addEventListener("click", () => {
            const payload = {
                exported_at: new Date().toISOString(),
                messages: collectMessages(),
            };
            downloadText(
                `chat_export_${Date.now()}.json`,
                JSON.stringify(payload, null, 2),
                "application/json;charset=utf-8",
            );
            setStatus("Exported JSON");
        });

        userInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && event.ctrlKey) {
                event.preventDefault();
                if (!sendButton.disabled) {
                    chatForm.requestSubmit();
                }
                return;
            }

            if (event.key === "ArrowUp") {
                if (!promptHistory.length) {
                    return;
                }
                if (promptHistoryIndex > 0) {
                    promptHistoryIndex -= 1;
                }
                userInput.value = promptHistory[promptHistoryIndex] ?? "";
                event.preventDefault();
                return;
            }

            if (event.key === "ArrowDown") {
                if (!promptHistory.length) {
                    return;
                }
                if (promptHistoryIndex < promptHistory.length - 1) {
                    promptHistoryIndex += 1;
                    userInput.value = promptHistory[promptHistoryIndex] ?? "";
                } else {
                    promptHistoryIndex = promptHistory.length;
                    userInput.value = "";
                }
                event.preventDefault();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.altKey && event.key.toLowerCase() === "h") {
                event.preventDefault();
                helpButton.click();
                return;
            }
            if (event.altKey && event.key.toLowerCase() === "c") {
                event.preventDefault();
                clearButton.click();
                return;
            }
            if (event.altKey && event.key.toLowerCase() === "r") {
                event.preventDefault();
                reloadButton.click();
            }
        });

        chatLog.addEventListener("htmx:afterSwap", () => {
            scrollChatToBottom();
            refreshDebugPanel();
            refreshDebugHistoryPanel();
            refreshSessionList();
        });

        scrollChatToBottom();
        refreshDebugPanel();
        refreshDebugHistoryPanel();
        refreshSessionList();
    </script>
</body>

</html>
